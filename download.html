<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>下载中心</title>
  <meta name="description" content="Minechat 下载中心。" />
  <link rel="icon" href="favicon.ico" />
  <style>
    :root {
      --bg-top: #edf4ff;
      --bg-bottom: #f8fbff;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: rgba(17, 24, 39, 0.08);
      --brand: #2f7cff;
      --brand-soft: rgba(47, 124, 255, 0.12);
      --shadow: 0 18px 50px rgba(100, 130, 180, 0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(47, 124, 255, 0.12), transparent 38%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 28px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg-bottom) 72%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .page {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      object-fit: contain;
    }

    .brand-title {
      display: flex;
      flex-direction: column;
    }

    .brand-title strong {
      font-size: 16px;
      letter-spacing: .2px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .navlink {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 14px;
      transition: border-color .18s ease, background-color .18s ease, color .18s ease;
    }

    .navlink:hover {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.56);
      color: var(--text);
      text-decoration: none;
    }

    .navlink.is-current {
      border-color: rgba(47, 124, 255, 0.18);
      background: rgba(255, 255, 255, 0.62);
      color: var(--text);
    }

    .platform-card:focus-visible,
    .download-link:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(47, 124, 255, 0.18);
    }

    .download-section {
      margin-top: 18px;
    }

    .download-section .section-title {
      margin-bottom: 16px;
    }

    .download-section .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .download-section .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .platform-card:focus-visible,
    .platform-card:focus-visible,
    .download-link:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(47, 124, 255, 0.18);
    }

    .platform-section {
      margin-top: 26px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
    }

    .platform-wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .platform-card {
      width: 100%;
      min-height: 246px;
      border: 1px solid rgba(180, 196, 220, 0.45);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 8px 24px rgba(79, 108, 159, 0.1);
      position: relative;
      padding: 22px 18px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .platform-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(79, 108, 159, 0.14);
    }

    .platform-card.is-active {
      border-color: rgba(47, 124, 255, 0.44);
      box-shadow: 0 18px 40px rgba(47, 124, 255, 0.16);
    }

    .platform-card.is-active::after {
      content: "";
      position: absolute;
      inset: auto 20px -1px;
      height: 4px;
      border-radius: 999px;
      background: var(--brand);
    }

    .platform-card.is-disabled {
      opacity: 0.72;
    }

    .platform-icon {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(239, 245, 255, 0.96));
      color: #556277;
    }

    .platform-icon svg {
      width: 46px;
      height: 46px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .platform-name {
      font-size: 22px;
      line-height: 1.2;
    }

    .platform-subtitle {
      min-height: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .platform-version {
      color: #5f6b7f;
      font-size: 15px;
    }

    .download-panel {
      width: min(100%, 760px);
      margin: 42px auto 0;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      border: 1px solid rgba(180, 196, 220, 0.38);
    }

    .download-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .download-title {
      font-size: 22px;
      font-weight: 700;
    }

    .download-meta {
      color: var(--muted);
      font-size: 14px;
    }

    .download-list {
      display: grid;
      gap: 12px;
    }

    .download-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
    }

    .download-item-text {
      min-width: 0;
    }

    .download-item strong,
    .download-item span {
      display: block;
    }

    .download-item span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 122px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), #5ca0ff);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 26px rgba(47, 124, 255, 0.22);
    }

    .empty-state {
      padding: 18px 20px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .platform-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(calc(100% - 20px), var(--max));
        padding: 18px 0 48px;
      }

      .topbar,
      .download-header,
      .download-item {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        min-width: unset;
      }

      nav {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
      }

      nav::-webkit-scrollbar {
        display: none;
      }

      .navlink {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .section-title {
        flex-direction: column;
        align-items: flex-start;
      }

      .platform-grid {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
        scroll-snap-type: x proximity;
      }

      .platform-grid::-webkit-scrollbar {
        display: none;
      }

      .platform-wrap {
        flex: 0 0 min(78vw, 240px);
        scroll-snap-align: start;
      }

      .platform-card {
        min-height: 196px;
      }

      .download-panel {
        width: 100%;
        margin-top: 24px;
        padding: 18px;
      }

      .download-link {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .platform-wrap {
        flex-basis: 84vw;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="topbar">
        <a class="brand" href="index.html" aria-label="Minechat">
          <img class="brand-mark" src="logo.png" alt="" aria-hidden="true" />
          <div class="brand-title">
            <strong>Minechat</strong>
          </div>
        </a>

        <nav aria-label="Primary">
          <a class="navlink" href="index.html#product">产品</a>
          <a class="navlink" href="index.html#features">功能</a>
          <a class="navlink" href="index.html#scenes">场景</a>
          <a class="navlink is-current" href="download.html">下载</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="page">

    <main>
      <section class="download-section" aria-labelledby="currentDownloadTitle">
        <div class="section-title">
          <span id="platformHint">自动识别当前设备平台</span>
        </div>

        <section class="download-panel" aria-live="polite">
          <div class="download-header">
            <div>
              <div id="downloadTitle" class="download-title">正在加载</div>
              <div id="downloadMeta" class="download-meta"></div>
            </div>
          </div>
          <div id="downloadContent" class="empty-state">正在读取版本信息...</div>
        </section>
      </section>

      <section class="platform-section" aria-labelledby="platformSectionTitle">
        <div class="section-title">
          <h2 id="platformSectionTitle">平台选择</h2>
        </div>
        <section id="platformGrid" class="platform-grid" aria-label="平台列表"></section>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const PLATFORM_CONFIG = {
        windows: { label: 'Windows', file: 'data/windows.json', icon: 'windows', subtitle: '桌面版' },
        mac: { label: 'macOS', file: 'data/mac.json', icon: 'mac', subtitle: '桌面版' },
        android: { label: 'Android', file: 'data/android.json', icon: 'android', subtitle: '移动版' },
        ios: { label: 'iOS', file: 'data/ios.json', icon: 'ios', subtitle: '移动版' }
      };

      const state = {
        detectedPlatform: detectPlatform(),
        selectedPlatform: null,
        payloads: {},
        errors: {}
      };

      const platformGridEl = document.getElementById('platformGrid');
      const platformHintEl = document.getElementById('platformHint');
      const downloadTitleEl = document.getElementById('downloadTitle');
      const downloadMetaEl = document.getElementById('downloadMeta');
      const downloadContentEl = document.getElementById('downloadContent');

      init();

      async function init() {
        await Promise.all(Object.keys(PLATFORM_CONFIG).map(loadPlatformData));
        state.selectedPlatform = resolveInitialPlatform(getQueryPlatform());
        renderPlatformHint();
        renderPlatforms();
        renderDownloadPanel(state.selectedPlatform);
      }

      function detectPlatform() {
        const ua = (navigator.userAgent || '').toLowerCase();
        const platform = (navigator.platform || '').toLowerCase();
        const combined = ua + ' ' + platform;

        if (/android/.test(combined)) return 'android';
        if (/iphone|ipad|ipod|ios/.test(combined)) return 'ios';
        if (/macintosh|mac os x|mac/.test(combined) && !/iphone|ipad|ipod/.test(combined)) return 'mac';
        if (/win|windows/.test(combined)) return 'windows';
        return 'windows';
      }

      function getQueryPlatform() {
        const params = new URLSearchParams(window.location.search);
        const value = (params.get('platform') || '').trim().toLowerCase();
        return Object.prototype.hasOwnProperty.call(PLATFORM_CONFIG, value) ? value : '';
      }

      async function loadPlatformData(platformKey) {
        try {
          const response = await fetch(PLATFORM_CONFIG[platformKey].file, { cache: 'no-store' });
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          state.payloads[platformKey] = normalizePayload(platformKey, data);
        } catch (error) {
          state.errors[platformKey] = error instanceof Error ? error.message : String(error);
        }
      }

      function normalizePayload(platformKey, data) {
        const versions = Array.isArray(data.versions) ? data.versions.slice() : [];
        const latestVersion = typeof data.latestVersion === 'string' ? data.latestVersion : '';
        const latest = versions.find(function (item) {
          return item && item.version === latestVersion;
        }) || versions[0] || null;

        return {
          label: typeof data.label === 'string' ? data.label : PLATFORM_CONFIG[platformKey].label,
          supported: Boolean(data.supported),
          latestVersion: latestVersion || (latest && latest.version) || '',
          unsupportedMessage: typeof data.unsupportedMessage === 'string' ? data.unsupportedMessage : '当前平台暂未提供下载。',
          updatedAt: typeof data.updatedAt === 'string' ? data.updatedAt : '',
          latest: latest
        };
      }

      function resolveInitialPlatform(queryPlatform) {
        if (queryPlatform && state.payloads[queryPlatform]) return queryPlatform;
        if (state.payloads[state.detectedPlatform]) return state.detectedPlatform;
        const firstLoaded = Object.keys(PLATFORM_CONFIG).find(function (key) {
          return Boolean(state.payloads[key]);
        });
        return firstLoaded || 'windows';
      }

      function renderPlatformHint() {
        const config = PLATFORM_CONFIG[state.detectedPlatform];
        if (!platformHintEl) {
          return;
        }
        platformHintEl.textContent = config
          ? '当前设备：' + config.label
          : '手动选择平台';
      }

      function renderPlatforms() {
        platformGridEl.innerHTML = '';
        Object.keys(PLATFORM_CONFIG).forEach(function (platformKey) {
          const config = PLATFORM_CONFIG[platformKey];
          const payload = state.payloads[platformKey];
          const version = payload && payload.latestVersion ? payload.latestVersion : '--';
          const supported = payload ? payload.supported : false;
          const card = document.createElement('div');
          card.className = 'platform-wrap';
          card.innerHTML = '' +
            '<button type="button" class="platform-card' +
              (platformKey === state.selectedPlatform ? ' is-active' : '') +
              (supported ? '' : ' is-disabled') +
            '">' +
              '<span class="platform-icon">' + getPlatformIconSvg(config.icon) + '</span>' +
              '<span class="platform-name">' + escapeHtml(config.label) + '</span>' +
              '<span class="platform-subtitle">' + escapeHtml(config.subtitle) + '</span>' +
            '</button>' +
            '<div class="platform-version">V' + escapeHtml(version) + '</div>';

          const button = card.querySelector('.platform-card');
          button.addEventListener('click', function () {
            state.selectedPlatform = platformKey;
            updateQuery(platformKey);
            renderPlatforms();
            renderDownloadPanel(platformKey);
          });
          platformGridEl.appendChild(card);
        });
      }

      function renderDownloadPanel(platformKey) {
        const payload = state.payloads[platformKey];
        const label = PLATFORM_CONFIG[platformKey] ? PLATFORM_CONFIG[platformKey].label : '客户端';

        if (!payload) {
          downloadTitleEl.textContent = label;
          downloadMetaEl.textContent = '';
          downloadContentEl.className = 'empty-state';
          downloadContentEl.dataset.messageLocked = state.errors[platformKey] ? 'true' : '';
          downloadContentEl.textContent = state.errors[platformKey] || '版本信息读取失败';
          return;
        }

        const latest = payload.latest;
        downloadTitleEl.textContent = label;
        downloadMetaEl.textContent = latest && latest.releaseDate
          ? '版本 ' + (latest.version || '--') + ' · ' + latest.releaseDate
          : '版本 ' + (payload.latestVersion || '--');

        if (!payload.supported || !latest || !Array.isArray(latest.downloads) || latest.downloads.length === 0) {
          downloadContentEl.className = 'empty-state';
          downloadContentEl.dataset.messageLocked = 'true';
          downloadContentEl.textContent = payload.unsupportedMessage;
          return;
        }

        downloadContentEl.className = 'download-list';
        downloadContentEl.dataset.messageLocked = '';
        downloadContentEl.innerHTML = latest.downloads.map(function (item) {
          const meta = [item.kind, item.file].filter(Boolean).join(' · ');
          return '<div class="download-item">' +
            '<div class="download-item-text"><strong>' + escapeHtml(item.name || label + ' 下载') + '</strong><span>' + escapeHtml(meta) + '</span></div>' +
            '<a class="download-link" href="' + escapeAttribute(item.url || '#') + '" download>下载</a>' +
          '</div>';
        }).join('');
      }

      function updateQuery(platformKey) {
        const url = new URL(window.location.href);
        url.searchParams.set('platform', platformKey);
        url.searchParams.delete('version');
        window.history.replaceState({}, '', url.toString());
      }

      function getPlatformIconSvg(iconKey) {
        const icons = {
          windows: '<svg viewBox="0 0 48 48" aria-hidden="true"><rect x="9" y="10" width="11" height="11" rx="1.5"></rect><rect x="28" y="10" width="11" height="11" rx="1.5"></rect><rect x="9" y="27" width="11" height="11" rx="1.5"></rect><rect x="28" y="27" width="11" height="11" rx="1.5"></rect></svg>',
          mac: '<svg viewBox="0 0 48 48" aria-hidden="true"><rect x="9" y="11" width="30" height="19" rx="4"></rect><path d="M6 34h36"></path><path d="M19 34l2-4h6l2 4"></path></svg>',
          android: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M16 18c2.4-2.8 5-4.2 8-4.2s5.6 1.4 8 4.2"></path><path d="M14 21h20a3 3 0 0 1 3 3v8a5 5 0 0 1-5 5H16a5 5 0 0 1-5-5v-8a3 3 0 0 1 3-3Z"></path><path d="M19 14l-2-4"></path><path d="M29 14l2-4"></path><circle cx="20" cy="27" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="28" cy="27" r="1.5" fill="currentColor" stroke="none"></circle></svg>',
          ios: '<svg viewBox="0 0 48 48" aria-hidden="true"><rect x="14" y="7" width="20" height="34" rx="6"></rect><path d="M21 12h6"></path><circle cx="24" cy="35" r="1.8" fill="currentColor" stroke="none"></circle></svg>'
        };
        return icons[iconKey] || icons.windows;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttribute(value) {
        return escapeHtml(value);
      }
    }());
  </script>
</body>
</html>
